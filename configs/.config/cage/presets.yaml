presets:
  claude-code:
    allow:
      # プロジェクト作業ディレクトリ
      - "."
      # 一時ファイル (macOS: /tmp -> /private/tmp)
      - path: "/tmp"
        eval-symlinks: true
      # ターミナル操作
      - "/dev/tty"
      # Claude Code データ
      - "$HOME/.claude"
      # npm/npx キャッシュ (MCP サーバー等)
      - "$HOME/.npm"
      # bun キャッシュ (bunx for ccstatusline 等)
      - "$HOME/.bun"
      # 各種キャッシュ
      - "$HOME/.cache"
      # ローカル state/bin (nvim, pnpm, mise 等)
      - "$HOME/.local"
      # ランタイムで書き込まれるツール設定 (op, gcloud 等)
      - "$HOME/.config"
    allow-keychain: true
    allow-git: true

auto-presets:
  - command: claude
    presets:
      - claude-code
