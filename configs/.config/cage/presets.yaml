presets:
  claude-code:
    allow:
      # プロジェクト作業ディレクトリ
      - "."
      # 一時ファイル (macOS: /tmp -> /private/tmp)
      - path: "/tmp"
        eval-symlinks: true
      # ターミナル操作
      - "/dev/tty"
      # Claude Code データ
      - "$HOME/.claude"
      - "$HOME/.claude.json"
      - "$HOME/.claude.json.backup"
      - "$HOME/.claude.json.lock"
      - "$HOME/.claude.lock"
      # Claude Code MCP ログ
      - "$HOME/Library/Caches/claude-cli-nodejs"
      # Playwright CLI (playwright-cli daemon, browser sessions)
      - "$HOME/Library/Caches/ms-playwright"
      # npm/npx キャッシュ (MCP サーバー等)
      - "$HOME/.npm"
      # bun キャッシュ (bunx for ccstatusline 等)
      - "$HOME/.bun"
      # pnpm store (デフォルト: ~/Library/pnpm/store)
      - "$HOME/Library/pnpm"
      # 各種キャッシュ
      - "$HOME/.cache"
      # ローカル state/bin (nvim, pnpm, mise 等)
      - "$HOME/.local"
      # ランタイムで書き込まれるツール設定 (op, gcloud 等)
      - "$HOME/.config"
      # Obsidian CLI
      - "/Applications/Obsidian.app"
      - "$HOME/Library/Application Support/obsidian"
      # Codex CLI (auth.json, config.toml, sessions 等)
      - "$HOME/.codex"
      # Obsidian Vault (enquire-mcp + agent file access)
      - "$HOME/src/github.com/thinceller/knowledge-base"
    allow-keychain: true
    allow-git: true

auto-presets:
  - command: claude
    presets:
      - claude-code
